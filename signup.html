{% extends "index.html" %}

{%block content %}



<main class="form-signin w-25 m-auto">

    <form method="POST" action="/signup">

        <h1 class="h3 mb-3 fw-normal">CREAT A NEW ACCOUNT</h1>

        <div class="form-floating"> <input type="text" class="form-control" name="first_name" id="floatingFirstName"
                placeholder="Name">

            <label for="floatingFirstName">First Name</label>

        </div>

        <div class="form-floating"> <input type="text" class="form-control" name="surname" id="floatingSurname"
                placeholder="Surname">

            <label for="floatingSurname">Surname</label>

        </div>

        <div class="form-floating"> <input type="email" class="form-control" name="email" id="floatingInput"
                placeholder="name@example.com"> <label for="floatingInput">Email address</label> </div>

        <div class="form-floating"> <input type="password" class="form-control" name="password" id="floatingPassword"
                placeholder="Password"> <label for="floatingPassword">Password</label> </div>

        <div class="form-check text-start my-3"> <input class="form-check-input" type="checkbox" value="remember-me"
                id="checkDefault"> <label class="form-check-label" for="checkDefault">

                Remember me

            </label> </div> <button class="btn btn-primary w-100 py-2" type="submit">Sign UP</button>

        <p class="mt-5 mb-3 text-body-secondary">© 2026</p>

    </form>

</main>

{%endblock%}
